name: Generate 3D contribution chart

on:
  schedule:
    # Runs every 6 hours
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Clean charts (donut, date, transparent bg)
        run: |
          python3 - <<'EOF'
          import re, glob
          for p in glob.glob('profile-3d-contrib/*.svg'):
              s = open(p).read()
              m = s.find('<g transform="translate(40, 520)">')
              if m >= 0:
                  depth = 0
                  end = m
                  for t in re.finditer(r'<g\b|</g>', s[m:]):
                      depth += 1 if t.group(0) != '</g>' else -1
                      if depth == 0:
                          end = m + t.end()
                          break
                  s = s[:m] + s[end:]
              s = re.sub(r'<text[^>]*>[^<]*20[0-9]{2}-[0-9]{2}-[0-9]{2}[^<]*</text>', '', s)
              s = re.sub(r'(<rect x="0" y="0" width="1280" height="850" fill=")[^"]+(")', r'\1none\2', s, count=1)
              open(p, 'w').write(s)
          EOF

      - name: Commit and push chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git commit -m "Update 3D contribution chart [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push origin main
