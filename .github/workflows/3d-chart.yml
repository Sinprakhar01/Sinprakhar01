name: Generate 3D contribution chart

# Renders the two chart variants the README actually uses and force-pushes
# them to the `chart-output` branch — same pattern as kairos.yml, so main
# history stays free of bot commits and repo size stays bounded.

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 3d-chart
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      # Post-processes the two SVGs the README embeds: removes the
      # bottom-left donut legend (the <g> at translate(40, 520)), strips
      # date-range labels, and paints a solid per-theme background
      # (night-view gets GitHub dark #0d1117, green-animate gets white).
      # Solid backgrounds keep charts legible even when the OS color
      # scheme and the GitHub theme disagree — prefers-color-scheme
      # follows the OS, so the "wrong" variant can load and must stand
      # on its own. The coordinates and regexes are tied to the output
      # layout of github-profile-3d-contrib@0.7.1 — if the action version
      # is bumped and the layout shifts, the warnings below fire instead
      # of silently corrupting (or silently skipping) the charts.
      - name: Clean charts (donut, date, theme bg)
        run: |
          python3 - <<'EOF'
          import re
          for p in ('profile-3d-contrib/profile-night-view.svg',
                    'profile-3d-contrib/profile-green-animate.svg'):
              s = open(p).read()
              m = s.find('<g transform="translate(40, 520)">')
              if m >= 0:
                  depth = 0
                  end = m
                  for t in re.finditer(r'<g\b|</g>', s[m:]):
                      depth += 1 if t.group(0) != '</g>' else -1
                      if depth == 0:
                          end = m + t.end()
                          break
                  s = s[:m] + s[end:]
              else:
                  print(f"::warning file={p}::donut legend anchor not found; "
                        "layout may have changed after an action version bump")
              s, n_dates = re.subn(r'<text[^>]*>[^<]*20[0-9]{2}-[0-9]{2}-[0-9]{2}[^<]*</text>', '', s)
              bg = '#0d1117' if 'night' in p else '#ffffff'
              s, n_bg = re.subn(r'(<rect x="0" y="0" width="1280" height="850" fill=")[^"]+(")', r'\g<1>' + bg + r'\g<2>', s, count=1)
              if n_dates == 0:
                  print(f"::warning file={p}::no date labels matched")
              if n_bg == 0:
                  print(f"::warning file={p}::background rect not matched; chart stays opaque")
              open(p, 'w').write(s)
          EOF

      - name: Publish to chart-output branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p out
          cp profile-3d-contrib/profile-night-view.svg out/
          cp profile-3d-contrib/profile-green-animate.svg out/
          cd out
          git init -b chart-output
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "3D chart sync [skip ci]"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" chart-output
