name: Generate 3D contribution chart

on:
  schedule:
    # Runs daily at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: yoshi389111/github-profile-3d-contrib@0.7.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          USERNAME: ${{ github.repository_owner }}

      - name: Strip language donut from charts
        run: |
          python3 - <<'EOF'
          import re, glob
          for p in glob.glob('profile-3d-contrib/*.svg'):
              s = open(p).read()
              m = s.find('<g transform="translate(40, 520)">')
              if m < 0:
                  continue
              depth = 0
              end = m
              for t in re.finditer(r'<g\b|</g>', s[m:]):
                  depth += 1 if t.group(0) != '</g>' else -1
                  if depth == 0:
                      end = m + t.end()
                      break
              open(p, 'w').write(s[:m] + s[end:])
          EOF

      - name: Commit and push chart
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A profile-3d-contrib/
          git commit -m "Update 3D contribution chart [skip ci]" || echo "no changes"
          git pull --rebase origin main
          git push origin main
